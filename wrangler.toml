name = "at-blog"
type = "pages"

[build]
command = "pnpm build"
publish = "dist"

[env]
NODE_ENV = "production"

[site]
bucket = "./dist"
entry-point = "workers-site"

[pages]
project_name = "at-blog"
production_branch = "main"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
source = "/*"
headers = [
    { key = "X-Content-Type-Options", value = "nosniff" },
    { key = "X-Frame-Options", value = "DENY" },
    { key = "X-XSS-Protection", value = "1; mode=block" },
    { key = "Content-Security-Policy", value = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:" }
]
